<script>
/* ============ SUPABASE + OFFLINE-SYNC STORAGE (OneDrive-шиг зарчим) ============ */
const SUPABASE_URL = 'https://etlbmfikjwwyptdlrlzj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_U95zXhvyn5Sq3w4XXroTwA_JubvRcv3';
let supabaseClient = null;
try{
  if(typeof supabase !== 'undefined'){ supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }
}catch(e){ console.error('Supabase эхлүүлэхэд алдаа:', e); }

const PENDING_QUEUE_KEY = '__pending_sync_queue__';
function getPendingQueue(){
  try{ const raw = localStorage.getItem(PENDING_QUEUE_KEY); return raw ? JSON.parse(raw) : []; }catch(e){ return []; }
}
function setPendingQueue(q){
  try{ localStorage.setItem(PENDING_QUEUE_KEY, JSON.stringify(q)); }catch(e){}
}
function addToPendingQueue(key){
  const q = getPendingQueue();
  if(!q.includes(key)){ q.push(key); setPendingQueue(q); }
}
function removeFromPendingQueue(key){
  setPendingQueue(getPendingQueue().filter(k=>k!==key));
}

async function loadKey(key, fallback){
  // 1) Эхлээд орон нутгийн кэш-ээс шууд ачаална (хурдан, offline-д ажиллана)
  let localValue = fallback;
  try{ const raw = localStorage.getItem(key); if(raw!=null) localValue = JSON.parse(raw); }catch(e){}
  // 2) Сүлжээтэй бол Supabase-аас хамгийн сүүлийн дата авахыг оролдоно
  if(supabaseClient && navigator.onLine){
    try{
      const { data, error } = await supabaseClient.from('kv_store').select('value').eq('key', key).maybeSingle();
      if(!error && data && data.value!=null){
        localStorage.setItem(key, JSON.stringify(data.value));
        return data.value;
      }
    }catch(e){ console.error('Cloud-оос унших алдаа (offline эсвэл сүлжээний асуудал):', e); }
  }
  return localValue;
}
async function saveKey(key, value){
  // 1) Орон нутагт шууд хадгална (offline-д ч алдагдахгүй)
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){ console.error('Орон нутагт хадгалахад алдаа:', e); }
  // 2) Сүлжээтэй бол шууд Supabase рүү илгээнэ; сүлжээгүй бол дараалалд нэмээд, сүлжээ ирэхэд автоматаар илгээнэ
  if(supabaseClient && navigator.onLine){
    try{
      const { error } = await supabaseClient.from('kv_store').upsert({ key, value, updated_at: new Date().toISOString() });
      if(error){ addToPendingQueue(key); } else { removeFromPendingQueue(key); }
    }catch(e){ addToPendingQueue(key); }
  } else {
    addToPendingQueue(key); // offline - дараа нь синк хийх дараалалд нэмнэ
  }
}
async function flushPendingQueue(){
  if(!supabaseClient || !navigator.onLine) return;
  const q = getPendingQueue();
  if(q.length===0) return;
  flash('Сүлжээ сэргэлээ, дата синк хийж байна...', 'accent');
  for(const key of q){
    try{
      const raw = localStorage.getItem(key);
      if(raw==null){ removeFromPendingQueue(key); continue; }
      const value = JSON.parse(raw);
      const { error } = await supabaseClient.from('kv_store').upsert({ key, value, updated_at: new Date().toISOString() });
      if(!error){ removeFromPendingQueue(key); }
    }catch(e){ /* дараагийн 'online' үед дахин оролдоно */ }
  }
  if(getPendingQueue().length===0){ flash('Бүх дата синк хийгдлээ ✓', 'accent'); }
}
window.addEventListener('online', ()=>{ flushPendingQueue(); });
window.addEventListener('load', ()=>{ if(navigator.onLine){ flushPendingQueue(); } });
function getUniqueCategories(){
  const set = new Set();
  state.products.forEach(p=>{ if(p.category && p.category.trim()) set.add(p.category.trim()); });
  return Array.from(set).sort();
}
function isMobileDevice(){
  return /Android|iPhone|iPad|iPod|Mobi/i.test(navigator.userAgent);
}
function isLowStock(p){ return (p.stock||0) <= (p.minStock!=null ? p.minStock : 5); }
function attachLayoutSafeBarcodeInput(inputEl, onEnter){
  // Windows-ийн гарын хэл (Кирилл/Англи) ямар ч байсан, тоон товчлуурын БОДИТ БАЙРЛАЛААР (e.code) ажилладаг
  // тул Alt+Shift хийж гараа сольсон эсэхээс үл хамааран үргэлж зөв тоо орно.
  inputEl.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ onEnter(inputEl.value); return; }
    const code = e.code || '';
    let digit = null;
    if(/^Digit[0-9]$/.test(code)) digit = code.slice(5);
    else if(/^Numpad[0-9]$/.test(code)) digit = code.slice(6);
    if(digit !== null){
      e.preventDefault();
      inputEl.value += digit;
      return;
    }
    if(e.key === 'Backspace'){
      e.preventDefault();
      inputEl.value = inputEl.value.slice(0, -1);
      return;
    }
    // Үсэг зэрэг бусад товчлуурыг хэвийн зөвшөөрнө (зарим баркод үсэг агуулж болно)
  });
}
const BACKUP_KEYS = ['pos:products','pos:suppliers','pos:customers','pos:sales','pos:purchases','pos:returns','pos:spoilage','pos:expenses','pos:closings','pos:ebarimtSettings','pos:ebarimtQueue'];
// CSV (Excel) татах туслах - Excel-д кирилл зөв харагдуулахын тулд UTF-8 BOM-той хадгална
function downloadCSV(filename, headerRow, rows){
  const escCell = v => { const s=(v??'').toString(); return (s.includes(',')||s.includes('"')||s.includes('\n')) ? '"'+s.replace(/"/g,'""')+'"' : s; };
  const csv = '\uFEFF' + [headerRow].concat(rows).map(r=>r.map(escCell).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  flash('Excel (CSV) файл татагдлаа', 'accent');
}
function exportSalesCSV(){
  const sales = filteredSales();
  const rows = [];
  sales.forEach(s=>{ (s.items||[]).forEach(it=>{
    rows.push([fmtDate(s.timestamp), it.name, it.qty, it.price, it.qty*it.price, payTypeLabel(s.payType), s.ebarimt||'']);
  }); });
  downloadCSV('borluulalt-'+new Date().toISOString().slice(0,10)+'.csv', ['Огноо','Бараа','Тоо','Үнэ','Дүн','Төлбөрийн төрөл','Ебаримт'], rows);
}
function exportPurchasesCSV(){
  const rows = [];
  state.purchases.forEach(pu=>{ (pu.items||[]).forEach(it=>{
    const sup = state.suppliers.find(s=>s.id===pu.supplierId);
    rows.push([fmtDate(pu.timestamp), it.name, it.qty, it.price, it.qty*it.price, sup?sup.name:'', payTypeLabel(pu.payType)]);
  }); });
  downloadCSV('orlogo-'+new Date().toISOString().slice(0,10)+'.csv', ['Огноо','Бараа','Тоо','Авсан үнэ','Дүн','Нийлүүлэгч','Төлбөрийн төрөл'], rows);
}
function exportExpensesCSV(){
  const rows = state.expenses.slice().sort((a,b)=>a.timestamp-b.timestamp).map(x=>[fmtDate(x.timestamp), x.category, x.note||'', x.amount]);
  downloadCSV('zarlaga-'+new Date().toISOString().slice(0,10)+'.csv', ['Огноо','Төрөл','Тайлбар','Дүн'], rows);
}
function payTypeLabel(pt){
  if(pt==='credit') return 'Зээл';
  if(pt==='qpay') return 'Qpay/Данс';
  if(pt==='pos') return 'POS';
  if(pt==='household') return 'Өрхийн хэрэглээ';
  if(pt==='mixed') return 'Холимог';
  return 'Бэлэн';
}
// ӨДРИЙН ХААЛТ (Z тайлан): өнөөдрийн орлогыг төлбөрийн төрлөөр гаргаж, кассын бодит
// мөнгөтэй тулгаж, зөрүүг бүртгэнэ.
// Борлуулалтын дүнг төлбөрийн төрлүүд рүү хуваарилна - "Холимог" бол хэсэг бүрээр нь
function addSaleToByType(byType, s){
  if(s.payType==='mixed' && Array.isArray(s.payments)){
    s.payments.forEach(p=>{ byType[p.type] = (byType[p.type]||0) + p.amount; });
  } else {
    const t = s.payType||'cash';
    byType[t] = (byType[t]||0) + s.total;
  }
}
function todaySalesBreakdown(){
  const start = rangeStart('today');
  const sales = state.sales.filter(s=>s.timestamp>=start && s.payType!=='household');
  const byType = { cash:0, credit:0, qpay:0, pos:0 };
  sales.forEach(s=>{ addSaleToByType(byType, s); });
  return { byType, count: sales.length, total: sales.reduce((s,x)=>s+x.total,0) };
}
async function saveDayClosing(form){
  const actual = parseFloat(form.actualCash.value);
  if(isNaN(actual) || actual<0){ flash('Тоолсон бэлэн мөнгөө зөв оруулна уу', 'warm'); return; }
  const b = todaySalesBreakdown();
  const rec = {
    id: uid(), timestamp: Date.now(), dateStr: new Date().toISOString().slice(0,10),
    expectedCash: b.byType.cash, actualCash: actual, diff: actual - b.byType.cash,
    qpay: b.byType.qpay, pos: b.byType.pos, credit: b.byType.credit,
    salesCount: b.count, total: b.total,
    note: form.note.value.trim()
  };
  state.closings.push(rec);
  await saveKey('pos:closings', state.closings);
  state.modal = null;
  flash('Өдрийн хаалт хийгдлээ. Зөрүү: '+mnt(rec.diff), rec.diff===0?'accent':'warm');
  render();
}
/* ============================================================
   ЕБАРИМТ (PosAPI 3.0) ХОЛБОЛТЫН МОДУЛЬ
   ------------------------------------------------------------
   Урьдчилсан нөхцөл (эзэн хийнэ):
   1. ebarimt.mn дээр Салбар + Пос бүртгүүлж, PosAPI хүсэлт гаргана
   2. PosAPI 3.0-ыг Windows компьютертээ суулгана (сервис 127.0.0.1:7080 дээр асна)
   3. Энэ программын Ебаримт тохиргоонд ТТД, posNo, branchNo, districtCode-оо
      оруулаад "Идэвхжүүлэх"-ийг асаана
   Анхаар: Илгээлт зөвхөн PosAPI суусан компьютер дээрээс ажиллана
   (гар утаснаас localhost-д хүрэх боломжгүй тул утсан дээр дараалалд орно).
   ============================================================ */
function ebarimtReady(){
  const s = state.ebarimtSettings;
  return !!(s && s.enabled && s.apiUrl && s.merchantTin && s.posNo && s.districtCode);
}
// Барааны НӨАТ/НХАТ задаргаа: үнэ бүх татвар ШИНГЭСЭН гэж үзнэ.
// Энгийн бараа: үнэ = суурь + 10% НӨАТ  -> НӨАТ = дүн * 10 / 110
// НХАТ-тай (архи, тамхи): үнэ = суурь + 10% НӨАТ + t% НХАТ -> хуваарь = 110 + t
function calcItemTaxes(amount, hasCityTax){
  const ct = hasCityTax ? (parseFloat(state.ebarimtSettings.cityTaxPercent)||2) : 0;
  const divisor = 110 + ct;
  const vat = Math.round(amount * 10 / divisor * 100) / 100;
  const cityTax = ct ? Math.round(amount * ct / divisor * 100) / 100 : 0;
  return { vat, cityTax };
}
// PosAPI 3.0-ын POST /rest/receipt бүтцээр борлуулалтын payload бэлтгэнэ
function buildEbarimtPayload(sale){
  const s = state.ebarimtSettings;
  let totalVat = 0, totalCityTax = 0;
  const items = (sale.items||[]).map(it=>{
    const p = state.products.find(x=>x.id===it.productId);
    const lineTotal = Math.round(it.price * it.qty * 100) / 100;
    const taxes = calcItemTaxes(lineTotal, p && p.hasCityTax);
    totalVat += taxes.vat; totalCityTax += taxes.cityTax;
    return {
      name: it.name,
      barCode: (p && p.barcode) ? p.barcode : sale.id,
      barCodeType: (p && p.barcode && /^[0-9]{8}$|^[0-9]{12,14}$/.test(p.barcode)) ? 'GS1' : 'UNDEFINED',
      classificationCode: (p && p.taxCode) ? p.taxCode : (s.defaultClassificationCode || ''),
      measureUnit: 'ш',
      qty: it.qty,
      unitPrice: it.price,
      totalAmount: lineTotal,
      totalVAT: taxes.vat,
      totalCityTax: taxes.cityTax
    };
  });
  totalVat = Math.round(totalVat*100)/100;
  totalCityTax = Math.round(totalCityTax*100)/100;
  const payMap = { cash:'CASH', qpay:'PAYMENT_CARD', pos:'PAYMENT_CARD', credit:'CASH' };
  return {
    totalAmount: sale.total,
    totalVAT: totalVat,
    totalCityTax: totalCityTax,
    districtCode: s.districtCode,
    merchantTin: s.merchantTin,
    branchNo: s.branchNo || '001',
    posNo: s.posNo,
    type: 'B2C_RECEIPT',
    receipts: [{
      totalAmount: sale.total,
      totalVAT: totalVat,
      totalCityTax: totalCityTax,
      taxType: 'VAT_ABLE',
      merchantTin: s.merchantTin,
      items: items
    }],
    payments: (sale.payType==='mixed' && Array.isArray(sale.payments))
      ? sale.payments.map(p=>({ code: payMap[p.type]||'CASH', status:'PAID', paidAmount: p.amount }))
      : [{
      code: payMap[sale.payType] || 'CASH',
      status: 'PAID',
      paidAmount: sale.total
    }]
  };
}
// fetch-ийг хугацааны хязгаартай (5 сек) гүйцэтгэнэ - PosAPI унтарсан үед кассыг гацаахгүй
async function fetchWithTimeout(url, options, ms){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms||5000);
  try{ return await fetch(url, Object.assign({}, options, { signal: ctrl.signal })); }
  finally{ clearTimeout(t); }
}
// Нэг борлуулалтын баримтыг PosAPI руу илгээнэ. Амжилттай бол sale дээр
// ebarimtReceipt {ddtd, lottery, qrData, date} хадгалагдана.
async function sendSaleToEbarimt(saleId, silent){
  const sale = state.sales.find(x=>x.id===saleId);
  if(!sale) return { ok:false, err:'sale not found' };
  if(sale.ebarimtReceipt) return { ok:true, already:true };
  if(!ebarimtReady()) return { ok:false, err:'not configured' };
  try{
    const payload = buildEbarimtPayload(sale);
    const res = await fetchWithTimeout(state.ebarimtSettings.apiUrl.replace(/\/$/,'') + '/rest/receipt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }, 6000);
    const data = await res.json().catch(()=>null);
    if(res.ok && data && (data.id || data.billId)){
      sale.ebarimtReceipt = {
        ddtd: data.id || data.billId,
        lottery: data.lottery || '',
        qrData: data.qrData || '',
        date: data.date || new Date().toISOString()
      };
      // Автомат илгээгдсэн бол дарааллаас хасна
      state.ebarimtQueue = state.ebarimtQueue.filter(id=>id!==saleId);
      await saveKey('pos:sales', state.sales);
      await saveKey('pos:ebarimtQueue', state.ebarimtQueue);
      if(!silent) flash('Ебаримт үүслээ. Сугалаа: ' + (sale.ebarimtReceipt.lottery||'-'), 'accent');
      return { ok:true };
    }
    const errMsg = (data && (data.message||data.error)) ? (data.message||data.error) : ('HTTP '+res.status);
    return { ok:false, err: errMsg };
  }catch(e){
    // Сервис унтарсан/хүрэх боломжгүй (утаснаас орсон гэх мэт)
    return { ok:false, err: (e && e.name==='AbortError') ? 'Хугацаа хэтэрлээ (PosAPI сервис асаалттай юу?)' : 'Холбогдож чадсангүй' };
  }
}
// Илгээгдээгүй борлуулалтыг дараалалд нэмнэ (дараа нь компьютерээс дахин илгээнэ)
async function queueEbarimt(saleId){
  if(state.ebarimtQueue.indexOf(saleId)===-1){
    state.ebarimtQueue.push(saleId);
    await saveKey('pos:ebarimtQueue', state.ebarimtQueue);
  }
}
// Дараалалд байгаа бүх баримтыг дахин илгээхийг оролдоно
async function retryEbarimtQueue(showResult){
  if(!ebarimtReady()){ if(showResult) flash('Ебаримт тохиргоо дутуу байна', 'warm'); return; }
  const ids = state.ebarimtQueue.slice();
  let ok=0, fail=0;
  for(const id of ids){
    const r = await sendSaleToEbarimt(id, true);
    if(r.ok) ok++; else fail++;
  }
  if(showResult) flash('Ебаримт дахин илгээлт: '+ok+' амжилттай, '+fail+' амжилтгүй', fail?'warm':'accent');
  render();
}
// PosAPI сервис ажиллаж буй эсэхийг шалгана (тохиргооны цонхны "Холболт шалгах")
async function testEbarimtConnection(){
  const s = state.ebarimtSettings;
  if(!s.apiUrl){ flash('API хаягаа оруулна уу', 'warm'); return; }
  try{
    const res = await fetchWithTimeout(s.apiUrl.replace(/\/$/,'') + '/rest/info', { method:'GET' }, 5000);
    if(res.ok){
      const data = await res.json().catch(()=>null);
      flash('\u2714 PosAPI холбогдлоо' + (data && data.posNo ? ' (posNo: '+data.posNo+')' : ''), 'accent');
    } else {
      flash('PosAPI хариу өглөө, гэхдээ алдаатай: HTTP '+res.status, 'warm');
    }
  }catch(e){
    flash('PosAPI-д холбогдож чадсангүй. Сервис асаалттай, хаяг зөв эсэхийг шалгана уу ('+s.apiUrl+')', 'warm');
  }
}
async function saveEbarimtSettings(form){
  const s = state.ebarimtSettings;
  s.enabled = !!form.enabled.checked;
  s.apiUrl = form.apiUrl.value.trim() || 'http://127.0.0.1:7080';
  s.merchantTin = form.merchantTin.value.trim();
  s.posNo = form.posNo.value.trim();
  s.branchNo = form.branchNo.value.trim() || '001';
  s.districtCode = form.districtCode.value.trim();
  s.defaultClassificationCode = form.defaultClassificationCode.value.trim();
  s.cityTaxPercent = parseFloat(form.cityTaxPercent.value)||2;
  if(s.enabled && (!s.merchantTin || !s.posNo || !s.districtCode)){
    flash('Идэвхжүүлэхийн тулд ТТД, Пос дугаар, Дүүргийн кодыг заавал оруулна', 'warm'); return;
  }
  await saveKey('pos:ebarimtSettings', s);

  flash('Ебаримт тохиргоо хадгалагдлаа' + (s.enabled?' (идэвхтэй)':' (идэвхгүй)'), 'accent');
  render();
}

function exportBackup(){
  try{
    const backup = {
      products: state.products, suppliers: state.suppliers, customers: state.customers,
      sales: state.sales, purchases: state.purchases, returns: state.returns, spoilage: state.spoilage,
      expenses: state.expenses, closings: state.closings,
      ebarimtSettings: state.ebarimtSettings, ebarimtQueue: state.ebarimtQueue,
      exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0,10);
    a.href = url; a.download = 'kass-noots-' + dateStr + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    state.lastBackupTs = Date.now();
    saveKey('pos:lastBackupTs', state.lastBackupTs);
    flash('Нөөц файл татагдлаа', 'accent');
  }catch(e){ flash('Нөөцлөхөд алдаа гарлаа', 'warm'); }
}

function roundTo100(n){ const base = Math.floor(n/100)*100; const rem = n - base; return rem >= 50 ? base+100 : base; }
const MARKUP = 1.20; // Бараа таб дээрх Автомат Зарах үнийн тооцоонд ашиглагдана
function getAutoSellPrice(p){ return roundTo100((p.buyPrice||0)*MARKUP); }
function getSellPrice(p){ return (p.manualSellPrice!=null && p.manualSellPrice>0) ? p.manualSellPrice : getAutoSellPrice(p); }
function lastPaymentDateOf(entity){
  const hist = entity.paymentHistory || [];
  if(!hist.length) return null;
  return Math.max(...hist.map(h=>h.timestamp));
}
function debtStatusBadge(entity){
  const debt = entity.debt||0; const paid = entity.paidTotal||0;
  if(debt<=0) return '<span class="badge paid">Төлсөн</span>';
  if(paid>0){
    const lp = lastPaymentDateOf(entity);
    return '<span class="badge partial">'+mnt(debt)+' (хэсэгчлэн'+(lp?', сүүлд '+fmtDate(lp):'')+')</span>';
  }
  return '<span class="badge unpaid">'+mnt(debt)+'</span>';
}
function getSupplierTotalInvoiced(supplierId){
  return state.purchases.filter(pu=>pu.supplierId===supplierId).reduce((sum,pu)=>sum+(pu.total||0),0);
}
function getSupplierLastPurchaseDate(supplierId){
  const pus = state.purchases.filter(pu=>pu.supplierId===supplierId);
  if(!pus.length) return null;
  return Math.max(...pus.map(pu=>pu.timestamp));
}
function getSupplierLastPaymentDate(supplier){ return lastPaymentDateOf(supplier); }
function statusOnlyBadge(entity){
  const debt = entity.debt||0; const paid = entity.paidTotal||0;
  if(debt<=0) return '<span class="badge paid">Төлсөн</span>';
  if(paid>0){
    const lp = lastPaymentDateOf(entity);
    return '<span class="badge partial">Хэсэгчлэн ('+mnt(debt)+' үлдсэн'+(lp?', сүүлд '+fmtDate(lp)+' төлсөн':'')+')</span>';
  }
  return '<span class="badge unpaid">Төлөөгүй</span>';
}
function payTypeBadge(pt, sale){
  if(pt==='credit') return '<span class="badge blue">Зээл</span>';
  if(pt==='qpay') return '<span class="badge partial">Qpay/Данс</span>';
  if(pt==='pos') return '<span class="badge ok">POS</span>';
  if(pt==='household') return '<span class="badge low">Өрхийн хэрэглээ</span>';
  if(pt==='mixed'){
    const parts = (sale && sale.payments) ? sale.payments.map(p=>payTypeLabel(p.type)+' '+mnt(p.amount)).join(', ') : '';
    return '<span class="badge blue" title="'+esc(parts)+'">Холимог</span>';
  }
  return '<span class="badge ok">Бэлэн</span>';
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const mnt = n => Math.round(n||0).toLocaleString('mn-MN') + '\u20AE';
const fmtDate = ts => new Date(ts).toLocaleDateString('mn-MN') + ' ' + new Date(ts).toLocaleTimeString('mn-MN',{hour:'2-digit',minute:'2-digit'});

async function initData(){
  // ХУРДНЫ ГОЛ ЗАСВАР: өмнө нь 13 сангийн түлхүүр тус бүрийг ДАРААЛУУЛАН (sequential await)
  // ачаалдаг байсан тул сүлжээ бүрийн хариу хүлээхэд секундууд хуримтлагдаж, апп нээгдэхэд
  // маш удаан (заримдаа 5-10 секунд) байсан. Одоо БҮГДИЙГ ЗЭРЭГ (Promise.all) ачаалж,
  // хамгийн удаан ганц хүсэлтийн хугацаагаар л хязгаарлагдана - хэдэн дахин хурдан.
  const [
    products, suppliers, customers, sales, purchases, returns, spoilage, expenses,
    qpayQr, adminPin, closings, lastBackupTs, ebarimtSettings, ebarimtQueue
  ] = await Promise.all([
    loadKey('pos:products', []),
    loadKey('pos:suppliers', []),
    loadKey('pos:customers', []),
    loadKey('pos:sales', []),
    loadKey('pos:purchases', []),
    loadKey('pos:returns', []),
    loadKey('pos:spoilage', []),
    loadKey('pos:expenses', []),
    loadKey('pos:qpayQr', DEFAULT_QPAY_QR),
    loadKey('pos:adminPin', null),
    loadKey('pos:closings', []),
    loadKey('pos:lastBackupTs', 0),
    loadKey('pos:ebarimtSettings', {
      enabled: false, apiUrl: 'http://127.0.0.1:7080', merchantTin: '', posNo: '',
      branchNo: '001', districtCode: '', defaultClassificationCode: '', cityTaxPercent: 2
    }),
    loadKey('pos:ebarimtQueue', [])
  ]);
  state.products=products; state.suppliers=suppliers; state.customers=customers; state.sales=sales;
  state.purchases=purchases; state.returns=returns; state.spoilage=spoilage; state.expenses=expenses;
  state.qpayQr=qpayQr; state.adminPin=adminPin; state.closings=closings; state.lastBackupTs=lastBackupTs;
  state.ebarimtSettings=ebarimtSettings; state.ebarimtQueue=ebarimtQueue;
  state.role = null; // нэвтрэх дэлгэц харуулна
  state.loaded = true;
  render();
  // Апп нээгдэх бүрд үлдэгдлүүд гүйлгээний түүхтэйгээ таарч буй эсэхийг автоматаар шалгаж,
  // зөрөө илэрвэл шууд анхааруулна - алдаа удаан анзаарагдалгүй хуримтлагдахаас сэргийлнэ.
  // (ХУРДНЫ ЗАСВАР: барааг тус бүрд нь бүх түүхээр гүйлгэдгийн оронд, ганц удаа бүх
  // түүхийг уншиж, бараа бүрийн зөрүүг НЭГ Л УДАА тооцно - өмнө нь O(бараа x гүйлгээ) байсан.)
  setTimeout(function(){
    try{
      const computed = computeAllStockDeltas();
      let mismatch = 0;
      state.products.forEach(p=>{ if(Math.max(0, computed.get(p.id)||0) !== (p.stock||0)) mismatch++; });
      if(mismatch > 0){
        flash('Анхаар: '+mismatch+' барааны үлдэгдэл гүйлгээний түүхээс зөрж байна. Бараа таб \u2192 "Үлдэгдэл тулгах" товчоор засна уу', 'warm');
      } else if(state.sales.length > 0 && (Date.now() - (state.lastBackupTs||0)) > 7*24*60*60*1000){
        // 7 хоногоос дээш хугацаанд нөөцлөөгүй бол сануулна - утас гээгдэх/эвдрэхэд дата алдагдахаас сэргийлнэ
        flash('\u{1F4BE} Сүүлд нөөцлөснөөс 7-с дээш хоног өнгөрчээ. "Нөөцлөх" товчоор датагаа хамгаална уу', 'warm');
      }
    }catch(e){ /* шалгалт амжилтгүй бол чимээгүй өнгөрөөнө */ }
    // Дараалалд илгээгдээгүй Ебаримт байвал (жишээ нь утаснаас хийсэн борлуулалтууд)
    // компьютерээс нээгдмэгц автоматаар илгээхийг оролдоно
    if(ebarimtReady() && state.ebarimtQueue.length > 0){
      retryEbarimtQueue(false).then(function(){
        if(state.ebarimtQueue.length===0){ flash('Дараалалд байсан бүх Ебаримт амжилттай илгээгдлээ', 'accent'); }
      });
    }
  }, 800);
}
function setTab(t){ state.tab=t; state.search=''; render(); }
function esc(s){ return (s??'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
let flashTimeout;
function flash(msg, kind){
  state.flashMsg = {msg, kind}; render();
  clearTimeout(flashTimeout);
  flashTimeout = setTimeout(()=>{ state.flashMsg=null; render(); }, 2200);
}

function findByBarcode(code){ return state.products.find(p => p.barcode && p.barcode.toLowerCase() === code.trim().toLowerCase()); }
function addToCart(productId, qty=1){
  const p = state.products.find(x=>x.id===productId);
  if(!p) return;
  const existing = state.cart.find(c=>c.productId===productId);
  const currentQty = existing ? existing.qty : 0;
  if(currentQty + qty > p.stock){ flash('Үлдэгдэл хүрэлцэхгүй байна: ' + p.name, 'warm'); return; }
  if(existing){ existing.qty += qty; } else { state.cart.push({ productId, name:p.name, price:getSellPrice(p), buyPrice:p.buyPrice, qty }); }
  render();
}
function removeFromCart(productId){ state.cart = state.cart.filter(c=>c.productId!==productId); render(); }
function changeCartQty(productId, delta){
  const c = state.cart.find(x=>x.productId===productId); if(!c) return;
  const p = state.products.find(x=>x.id===productId);
  const nq = c.qty + delta;
  if(nq <= 0){ removeFromCart(productId); return; }
  if(p && nq > p.stock){ flash('Үлдэгдэл хүрэлцэхгүй', 'warm'); return; }
  c.qty = nq; render();
}
function cartTotal(){ return state.cart.reduce((s,c)=>s + c.price*c.qty, 0); }
// Бэлнээр төлөхөд үйлчлүүлэгчид буцааж өгөх хариултыг тооцоолно.
// Холимог үед бэлэн хэсэг (cartSplitCash)-ээс, цэвэр бэлэн үед нийт дүнгээс тооцно.
function cashPortionDue(){
  if(state.cartPayType==='mixed') return parseFloat(state.cartSplitCash)||0;
  return cartTotal();
}
function changeDueText(){
  const received = parseFloat(state.cartCashReceived);
  if(isNaN(received) || received<=0) return '-';
  const due = cashPortionDue();
  const change = received - due;
  if(change < 0) return mnt(Math.abs(change)) + ' ДУТУУ';
  return mnt(change);
}
function splitRemainText(){
  const total = cartTotal();
  const sum = (parseFloat(state.cartSplitCash)||0) + (parseFloat(state.cartSplitQpay)||0) + (parseFloat(state.cartSplitPos)||0);
  const remain = total - sum;
  if(Math.abs(remain) < 0.5) return '<span style="color:var(--accent);">0\u20AE \u2714</span>';
  if(remain > 0) return '<span style="color:var(--warm);">'+mnt(remain)+' дутуу</span>';
  return '<span style="color:var(--warm);">'+mnt(Math.abs(remain))+' ИЛҮҮ байна</span>';
}
// Дэлгүүрийн ажилтан Ебаримтын хуудсанд буруу гараар шивж дүн зөрүүлэхгүйн тулд,
// нийт төлбөрийн дүнг (цэвэр тоон утга, ₮ тэмдэггүй, таслалгүй) clipboard-руу хуулна.
async function copyToClipboard(text){
  try{
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){ /* доор буцаад fallback-аар оролдоно */ }
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position='fixed'; ta.style.left='-9999px'; ta.style.top='0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }catch(e){ return false; }
}
function looksLikeLayoutMismatch(code){
  // Windows-ийн гарын хэл Кирилл дээр байхад баркод уншигчийн тоо энэ тэмдэгтүүд болж хувирдаг
  return /[№;%:?*_₮!@#\^&()]/.test(code);
}
// EAN-13 / EAN-8 / UPC-A стандарт тоон баркодын check-digit шалгалт.
// Камерын гэрэл тусгал, чичрэлт зэргээс болж 1 оронгоор буруу уншсан кодыг энэ функц илрүүлж чадна.
// Тоон бус (үсэгтэй) баркод буюу шалгах боломжгүй урттай бол true буцаана (шалгалт алгасна).
function isValidNumericBarcodeChecksum(code){
  const c = (code||'').trim();
  if(!/^[0-9]+$/.test(c)) return true; // тоон бус кодыг (жишээ нь дотоод SKU) шалгахгүй, шууд зөвшөөрнө
  if(c.length!==8 && c.length!==12 && c.length!==13) return true; // мэдэгддэггүй урттай бол шалгалгүй өнгөрөөнө
  const digits = c.split('').map(Number);
  const checkDigit = digits[digits.length-1];
  const body = digits.slice(0, -1);
  let sum = 0;
  // EAN/UPC стандарт: баруунаас зүүн тийш ээлжлэн 3,1 жинтэй нэмнэ
  for(let i=0; i<body.length; i++){
    const posFromRight = body.length - i; // 1-ээс эхэлнэ
    const weight = (posFromRight % 2 === 1) ? 3 : 1;
    sum += body[i]*weight;
  }
  const calcCheck = (10 - (sum % 10)) % 10;
  return calcCheck === checkDigit;
}
async function handleScanSubmit(code){
  if(!code) return;
  if(looksLikeLayoutMismatch(code)){
    flash('Гарын хэл буруу байна! Windows дээрээ Alt+Shift дараад "ENG" болгоод дахин скан хийнэ үү', 'warm');
    const input = document.getElementById('scanInput');
    if(input){ input.value=''; input.focus(); }
    return;
  }
  const p = findByBarcode(code);
  if(p){ addToCart(p.id); } else { flash('Баркод олдсонгүй: ' + code, 'warm'); }
  const input = document.getElementById('scanInput');
  if(input){ input.value=''; input.focus(); }
}
// Гүйлгээний түгжээ: Хадгалах/Тооцох товчийг санамсаргүй 2 удаа хурдан дарахад гүйлгээ
// давхардаж, үлдэгдэл 2 дахин нэмэгдэх/хасагдахаас сэргийлнэ.
let txLock = false;
async function checkout(){
  if(txLock) return; txLock = true;
  try{ await checkoutInner(); } finally { txLock = false; }
}
async function checkoutInner(){
  if(state.cart.length===0) return;
  if(state.cartPayType==='credit' && !state.cartCustomerId){
    flash('Зээлээр борлуулахын тулд харилцагч сонгоно уу', 'warm'); return;
  }
  // Холимог төлбөр: 3 хэсгийн нийлбэр яг нийт дүнтэй тэнцэх ёстой - мөнгөн дүн зөрөхөөс сэргийлнэ
  let mixedPayments = null;
  if(state.cartPayType==='mixed'){
    const c = parseFloat(state.cartSplitCash)||0, q = parseFloat(state.cartSplitQpay)||0, po = parseFloat(state.cartSplitPos)||0;
    const sum = c+q+po;
    if(Math.abs(sum - cartTotal()) > 0.5){
      flash('Холимог төлбөрийн нийлбэр ('+mnt(sum)+') нийт дүнтэй ('+mnt(cartTotal())+') таарахгүй байна', 'warm'); return;
    }
    mixedPayments = [];
    if(c>0) mixedPayments.push({type:'cash', amount:c});
    if(q>0) mixedPayments.push({type:'qpay', amount:q});
    if(po>0) mixedPayments.push({type:'pos', amount:po});
    if(mixedPayments.length===0){ flash('Дор хаяж нэг төлбөрийн дүн оруулна уу', 'warm'); return; }
  }
  // Бэлэн (эсвэл холимогийн бэлэн хэсэг)-д авсан мөнгө хүрэлцэж буйг шалгана
  const cashDue = cashPortionDue();
  const cashReceived = parseFloat(state.cartCashReceived);
  if(!isNaN(cashReceived) && cashReceived>0 && (state.cartPayType==='cash'||state.cartPayType==='mixed') && cashReceived < cashDue - 0.5){
    flash('Авсан бэлэн мөнгө ('+mnt(cashReceived)+') дутуу байна - бэлнээр төлөх дүн: '+mnt(cashDue), 'warm'); return;
  }
  const changeDue = (!isNaN(cashReceived) && cashReceived>0) ? Math.round((cashReceived - cashDue)*100)/100 : null;
  // Тооцоо хийхийн өмнө үлдэгдлийг дахин шалгана - сагсанд нэмснээс хойш өөр газар (жишээ нь Хоргодол) үлдэгдэл өөрчлөгдсөн байж болзошгүй
  for(const c of state.cart){
    const p = state.products.find(x=>x.id===c.productId);
    if(!p){ flash('Бараа олдсонгүй: ' + c.name + '. Сагснаас хасна уу', 'warm'); return; }
    if(c.qty > p.stock){ flash('Үлдэгдэл хүрэлцэхгүй: ' + p.name + ' (одоо үлдэгдэл ' + p.stock + ')', 'warm'); return; }
  }
  const isHousehold = state.cartPayType === 'household';
  // Хуучин (программ ашиглаж эхлэхээс өмнөх) борлуулалтыг зөв огноогоор бүртгэхэд зориулав
  let ts = Date.now();
  if(state.cartDateOverride && state.cartDateValue){
    const now = new Date();
    const custom = new Date(state.cartDateValue+'T00:00:00');
    custom.setHours(now.getHours(), now.getMinutes(), now.getSeconds()); // тухайн өдрийн доторх цагийг одоогийн цагаар тавина
    ts = custom.getTime();
  }
  // "Өрхийн хэрэглээ" бол жинхэнэ борлуулалт биш - мөнгө орж ирдэггүй тул ЗАРАХ ҮНЭ биш
  // АВСАН ҮНЭ (өртөг)-өөр бүртгэж, зардал/алдагдал болгон тооцно. Үлдэгдэл хэвийн бууна.
  const items = state.cart.map(c=> isHousehold ? {...c, price: c.buyPrice||0} : {...c});
  const total = isHousehold ? items.reduce((s,it)=>s+it.price*it.qty,0) : cartTotal();
  const sale = {
    id: uid(), timestamp: ts, items, total,
    customerId: state.cartCustomerId || null,
    payType: state.cartPayType,
    ebarimt: state.cartEbarimt.trim() || null,
    payments: mixedPayments,
    cashReceived: (changeDue!=null ? cashReceived : null),
    changeGiven: (changeDue!=null && changeDue>=0 ? changeDue : null)
  };
  state.cart.forEach(c=>{ const p = state.products.find(x=>x.id===c.productId); if(p) p.stock = Math.max(0, p.stock - c.qty); });
  if(state.cartPayType==='credit'){
    const cust = state.customers.find(c=>c.id===state.cartCustomerId);
    if(cust){ if((cust.debt||0)===0){ cust.paidTotal = 0; } cust.debt = (cust.debt||0) + total; }
    await saveKey('pos:customers', state.customers);
  }
  state.sales.push(sale);
  state.cart = []; state.cartCustomerId=''; state.cartPayType='cash'; state.cartEbarimt=''; state.cartDateOverride=false; state.cartDateValue='';
  state.cartCashReceived=''; state.cartSplitCash=''; state.cartSplitQpay=''; state.cartSplitPos='';
  await saveKey('pos:products', state.products);
  await saveKey('pos:sales', state.sales);
  if(isHousehold){
    // Борлуулалт таб дээрх "Өрхийн хэрэглээ"-г Зарлага табтай холбоно: барааны өртгийг
    // автоматаар Зарлагын бүртгэлд "Өрхийн хэрэглээ" ангиллаар нэмж, 2 системийг нэгтгэнэ.
    const itemsDesc = items.map(it=>it.name+' x'+it.qty).join(', ');
    state.expenses.push({
      id: uid(), timestamp: sale.timestamp, category: 'Өрхийн хэрэглээ', amount: total,
      note: 'Борлуулалт табнаас автоматаар: ' + itemsDesc, sourceSaleId: sale.id
    });
    await saveKey('pos:expenses', state.expenses);
    // Өрхийн хэрэглээ бол мөнгөн орлого биш тул Ебаримтад paste хийх шаардлагагүй
    flash('Өрхийн хэрэглээ бүртгэгдлээ - үлдэгдэл хасагдаж, Зарлага табанд (өртгөөр) автоматаар нэмэгдлээ', 'accent');
  } else {
    // Хариулт өгөх мэдэгдэл: авсан мөнгө оруулсан бол хамгийн түрүүнд ТОМООР харуулна
    const changeMsg = (sale.changeGiven!=null && sale.changeGiven>0) ? ' | ХАРИУЛТ: '+mnt(sale.changeGiven) : '';
    // ЕБАРИМТ АВТОМАТ ИЛГЭЭЛТ: тохиргоо идэвхтэй бол бэлэн/Qpay/POS/холимог борлуулалтын
    // баримтыг PosAPI-аар шууд үүсгэнэ. Зээл нь мөнгө ороогүй тул илгээхгүй.
    if(ebarimtReady() && ['cash','qpay','pos','mixed'].indexOf(sale.payType)>-1){
      const r = await sendSaleToEbarimt(sale.id, true);
      if(r.ok){
        flash('Худалдан авалт баталгаажиж, Ебаримт үүслээ. Сугалаа: '+(sale.ebarimtReceipt&&sale.ebarimtReceipt.lottery||'-')+changeMsg, 'accent');
      } else {
        await queueEbarimt(sale.id);
        flash('Худалдан авалт баталгаажлаа'+changeMsg+'. Ебаримт илгээгдсэнгүй ('+r.err+') - дараалалд орлоо', 'warm');
      }
    } else {
      // Ебаримт идэвхгүй үеийн хуучин урсгал: дүнг хуулж, гараар paste хийнэ
      const copied = await copyToClipboard(String(Math.round(total)));
      flash('Худалдан авалт баталгаажлаа'+changeMsg + (copied ? ' | Дүн ('+mnt(total)+') хуулагдлаа' : ''), 'accent');
    }
  }
  render();
}

async function saveProduct(form){
  const d = state.modal.data;
  d.name = form.name.value.trim(); d.barcode = form.barcode.value.trim(); d.category = form.category.value.trim();
  d.buyPrice = parseFloat(form.buyPrice.value)||0;
  d.manualSellPrice = (form.manualSellPrice.value.trim()!=='') ? (parseFloat(form.manualSellPrice.value)||0) : null;
  // d.stock-ыг эндээс шинэчлэхгүй - зөвхөн Орлого/Борлуулалт/Буцаалт/Хорогдлын гүйлгээгээр л өөрчлөгдөнө
  d.minStock = Math.max(0, parseFloat(form.minStock.value)||5);
  d.expiryDate = (form.expiryDate && form.expiryDate.value) ? form.expiryDate.value : null;
  d.taxCode = (form.taxCode && form.taxCode.value.trim()) ? form.taxCode.value.trim() : null;
  d.hasCityTax = !!(form.hasCityTax && form.hasCityTax.checked);
  d.supplierId = (form.supplierId && form.supplierId.value) ? form.supplierId.value : (d.supplierId||'');
  if(!d.name){ flash('Барааны нэрийг оруулна уу', 'warm'); return; }
  if(!d.id){
    // Шинэ бараа үүсгэх үед л ижил нэртэй бараа байгаа эсэхийг шалгана (дахин худалдан авахад хамаарахгүй, учир нь тэр үед жагсаалтаас сонгодог)
    const normalizedNew = d.name.toLowerCase().replace(/\s+/g,' ').trim();
    const dup = state.products.find(p=> p.name.toLowerCase().replace(/\s+/g,' ').trim() === normalizedNew);
    if(dup){
      flash('"'+dup.name+'" нэртэй бараа аль хэдийн бүртгэлтэй байна (үлдэгдэл: '+dup.stock+'). Дахин авахдаа жагсаалтаас сонгоно уу', 'warm');
      return;
    }
    d.id = uid(); state.products.push(d);
  } else {
    const idx = state.products.findIndex(p=>p.id===d.id); state.products[idx] = d;
  }
  await saveKey('pos:products', state.products);
  const shouldAddToPurchase = state.modal.addToPurchaseAfterSave;
  state.modal = shouldAddToPurchase ? { type:'purchaseEntry' } : null;
  flash('Хадгаллаа', 'accent');
  if(shouldAddToPurchase){ addToPurchaseCart(d.id); }
  render();
}

function purchaseCartTotal(){ return state.purchaseCart.reduce((s,c)=>s+c.price*c.qty,0); }
async function submitPurchase(){

  try{ await submitPurchaseInner(); } finally { txLock = false; }
}
async function submitPurchaseInner(){
  if(state.purchaseCart.length===0){ flash('Бараа сонгоно уу', 'warm'); return; }
  if(!state.purchaseSupplierId){ flash('Нийлүүлэгч сонгоно уу', 'warm'); return; }
  const total = purchaseCartTotal();
  const payType = state.purchasePayType;
  let ts = Date.now();
  if(state.purchaseDateOverride && state.purchaseDateValue){
    const now = new Date();
    const custom = new Date(state.purchaseDateValue+'T00:00:00');
    custom.setHours(now.getHours(), now.getMinutes(), now.getSeconds()); // тухайн өдрийн доторх цагийг одоогийн цагаар тавина
    ts = custom.getTime();
  }
  // Эхлээд "хүлээгдэж буй" (pending) шинэ бараа, засваруудыг ЯГ ОДОО л бодитоор бааз руу бичнэ - зөвхөн "Бүртгэх" дарсан үед
  state.purchaseCart.forEach(c=>{
    if(c.pendingNewProduct){
      const pn = c.pendingNewProduct;
      const product = { id: uid(), barcode: pn.barcode||'', name: c.name, category: pn.category||'', buyPrice: c.price, manualSellPrice: pn.manualSellPrice, stock: 0, minStock: 5, supplierId: pn.supplierId||state.purchaseSupplierId||'' };
      state.products.push(product);
      c.productId = product.id; // сая үүссэн бодит ID-г сагсны мөрөнд оноож, доорх items хуулбарт зөв орно
      delete c.pendingNewProduct;
    } else if(c.pendingEdit){
      const p = state.products.find(x=>x.id===c.productId);
      if(p){ p.name = c.pendingEdit.name; p.category = c.pendingEdit.category; p.buyPrice = c.pendingEdit.buyPrice; p.manualSellPrice = c.pendingEdit.manualSellPrice; }
      delete c.pendingEdit;
    }
  });
  const purchase = { id: uid(), timestamp: ts, supplierId: state.purchaseSupplierId, items: state.purchaseCart.map(c=>({...c})), total, payType };
  state.purchaseCart.forEach(c=>{
    const p = state.products.find(x=>x.id===c.productId);
    if(p){ p.stock = (p.stock||0) + c.qty; p.buyPrice = c.price; }
  });
  const sup = state.suppliers.find(s=>s.id===state.purchaseSupplierId);
  if(sup){
    sup.totalInvoiced = (sup.totalInvoiced||0) + total; // нийт худалдан авалтын дүн - төлбөрийн төрлөөс үл хамааран нэмэгдэнэ
    if(payType==='credit'){
      // зээлээр (дараа төлнө) авсан бол л өглөгт нэмнэ; бэлнээр шууд төлсөн бол өглөг үүсэхгүй
      if((sup.debt||0)===0){ sup.paidTotal = 0; }
      sup.debt = (sup.debt||0) + total;
    }
  }
  state.purchases.push(purchase);
  state.purchaseCart = []; state.purchaseSupplierId=''; state.purchaseDateOverride=false; state.purchaseDateValue='';
  state.modal = null; // амжилттай бүртгэсний дараа цонхыг хаана
  await saveKey('pos:products', state.products);
  await saveKey('pos:suppliers', state.suppliers);
  await saveKey('pos:purchases', state.purchases);
  flash('Худалдан авалт бүртгэгдлээ, үлдэгдэл нэмэгдлээ', 'accent');
  render();
}

async function submitPurchaseEditInner(){
  const pu = state.purchases.find(x=>x.id===state.editPurchaseId);
  if(!pu){ flash('Орлого олдсонгүй', 'warm'); return; }
  if(state.editPurchaseCart.length===0){ flash('Бараа сонгоно уу', 'warm'); return; }
  if(!state.editPurchaseSupplierId){ flash('Нийлүүлэгч сонгоно уу', 'warm'); return; }

  // 1-2-р алхам: ХУУЧИН ба ШИНЭ гүйлгээний зөрүүг (delta) бараа тус бүрээр НЭГ УДАА тооцож хэрэглэнэ.
  // Өмнө нь "эхлээд хасаад (0-д хамгаалж), дараа нь нэмэх" аргаар хийдэг байсан нь үлдэгдэл
  // завсартаа 0-с доош орох тохиолдолд тоог хийсвэрээр ӨСГӨДӨГ алдаатай байсан тул ингэж зассан.
  const oldSupplier = state.suppliers.find(s=>s.id===pu.supplierId);
  const deltaByProduct = {};
  pu.items.forEach(oldItem=>{
    deltaByProduct[oldItem.productId] = (deltaByProduct[oldItem.productId]||0) - oldItem.qty;
  });
  state.editPurchaseCart.forEach(c=>{
    deltaByProduct[c.productId] = (deltaByProduct[c.productId]||0) + c.qty;
  });
  Object.keys(deltaByProduct).forEach(pid=>{
    const p = state.products.find(x=>x.id===pid);
    if(!p) return;
    const next = (p.stock||0) + deltaByProduct[pid];
    p.stock = Math.max(0, next);
    if(next < 0){ flash('Анхаар: "'+p.name+'" үлдэгдэл 0-с доош орох тооцоо гарсан тул 0 болголоо. "Үлдэгдэл тулгах" товчоор шалгана уу', 'warm'); }
  });
  if(oldSupplier && (pu.payType||'credit')==='credit'){
    oldSupplier.debt = Math.max(0, (oldSupplier.debt||0) - pu.total);
  }

  const newTotal = state.editPurchaseCart.reduce((s,c)=>s+c.price*c.qty,0);
  const newSupplier = state.suppliers.find(s=>s.id===state.editPurchaseSupplierId);
  if(newSupplier && state.editPurchasePayType==='credit'){
    if((newSupplier.debt||0)===0){ newSupplier.paidTotal = 0; }
    newSupplier.debt = (newSupplier.debt||0) + newTotal;
  }

  // 3-р алхам: гүйлгээний бичлэгийг шинэчилнэ (огноог хэрэв өөрчилсөн бол шинэчилж, зассан тэмдэглэгээ нэмнэ)
  pu.items = state.editPurchaseCart.map(c=>({...c}));
  pu.total = newTotal;
  pu.supplierId = state.editPurchaseSupplierId;
  pu.payType = state.editPurchasePayType;
  if(state.editPurchaseDateValue){
    const oldD = new Date(pu.timestamp);
    const newD = new Date(state.editPurchaseDateValue+'T00:00:00');
    newD.setHours(oldD.getHours(), oldD.getMinutes(), oldD.getSeconds());
    pu.timestamp = newD.getTime();
  }
  pu.editedAt = Date.now();

  state.editPurchaseId = null; state.editPurchaseCart = []; state.editPurchaseSupplierId=''; state.editPurchasePayType='credit'; state.editPurchaseDateValue='';
  state.modal = null;
  await saveKey('pos:products', state.products);
  await saveKey('pos:suppliers', state.suppliers);
  await saveKey('pos:purchases', state.purchases);
  flash('Орлого засварлагдлаа, үлдэгдэл/өглөг зөв тоогоор шинэчлэгдлээ', 'accent');
  render();
}

async function handlePurchaseScanSubmit(code){
  if(!code || !code.trim()) return;
  if(looksLikeLayoutMismatch(code)){
    flash('Гарын хэл буруу байна! Windows дээрээ Alt+Shift дараад "ENG" болгоод дахин скан хийнэ үү', 'warm');
    const input = document.getElementById('purchaseScanInput');
    if(input){ input.value=''; }
    return;
  }
  const p = findByBarcode(code);
  if(p){
    // олдсон бараа - шинэчлэх/харах цонх нээгдэнэ (одоогийн үлдэгдлийг мэдээлэл болгож харуулна)
    state.modal = { type:'quickNewProduct', data:{ productId:p.id, barcode:p.barcode||'', name:p.name, category:p.category||'', buyPrice:p.buyPrice||0, manualSellPrice:p.manualSellPrice, currentStock:p.stock||0, supplierId: state.purchaseSupplierId||p.supplierId||'' } };
    render();
  } else {
    // Хараахан бааз руу бичигдээгүй ч, сагсанд аль хэдийн "pending" байдлаар орсон эсэхийг шалгана (давхар цонх нээхгүй, шууд тоог нэмнэ)
    const pendingItem = state.purchaseCart.find(c=>c.pendingNewProduct && c.pendingNewProduct.barcode===code.trim());
    if(pendingItem){
      pendingItem.qty += 1;
      flash('Тоо нэмэгдлээ: ' + pendingItem.name + ' (' + pendingItem.qty + ')', 'accent');
      render();
    } else {
      // цоо шинэ баркод - шинэ бараа бүртгэх цонх нээгдэнэ, "Бүртгэх" дарах хүртэл бааз руу бичигдэхгүй
      state.modal = { type:'quickNewProduct', data:{ barcode:code.trim(), name:'', category: state.purchaseCategoryFilter||'', supplierId: state.purchaseSupplierId||'' } };
      render();
      triggerBarcodeLookup(code.trim());
    }
  }
  const input = document.getElementById('purchaseScanInput');
  if(input){ input.value=''; }
}

let html5QrcodeInstance = null;
let cameraRunning = false;
let cameraTorchOn = false;
let cameraTorchSupported = false;
let cameraZoomCaps = null; // {min,max,step} - төхөөрөмж дэмждэг бол
let cameraZoomLevel = 2;
function cameraControlsHtml(){
  let h = '';
  if(cameraTorchSupported){
    h += '<button type="button" class="btn btn-ghost btn-sm" id="torchToggleBtn">'+(cameraTorchOn?'\u{1F526} Гэрэл унтраах':'\u{1F526} Гэрэл асаах')+'</button>';
  }
  if(cameraZoomCaps){
    h += '<button type="button" class="btn btn-ghost btn-sm" id="zoomOutBtn">\u2212 Zoom</button><button type="button" class="btn btn-ghost btn-sm" id="zoomInBtn">+ Zoom</button>';
  }
  return h;
}
function attachCameraControlHandlers(){
  const torchBtn = document.getElementById('torchToggleBtn');
  if(torchBtn) torchBtn.onclick = function(){
    if(!html5QrcodeInstance || !html5QrcodeInstance.applyVideoConstraints) return;
    cameraTorchOn = !cameraTorchOn;
    html5QrcodeInstance.applyVideoConstraints({ advanced: [{ torch: cameraTorchOn }] }).catch(function(){ cameraTorchOn = false; });
    torchBtn.textContent = cameraTorchOn ? '\u{1F526} Гэрэл унтраах' : '\u{1F526} Гэрэл асаах';
  };
  function applyZoom(delta){
    if(!html5QrcodeInstance || !cameraZoomCaps || !html5QrcodeInstance.applyVideoConstraints) return;
    const step = cameraZoomCaps.step || 0.5;
    cameraZoomLevel = Math.min(cameraZoomCaps.max, Math.max(cameraZoomCaps.min||1, cameraZoomLevel + delta*Math.max(step,0.5)));
    html5QrcodeInstance.applyVideoConstraints({ advanced: [{ zoom: cameraZoomLevel }] }).catch(function(){});
  }
  const zin = document.getElementById('zoomInBtn');
  if(zin) zin.onclick = function(){ applyZoom(1); };
  const zout = document.getElementById('zoomOutBtn');
  if(zout) zout.onclick = function(){ applyZoom(-1); };
}
let cameraScanTarget = 'kass'; // 'kass' эсвэл 'purchase' - хаанаас дуудсанаас хамаарч оноогдоно
// Буруу уншилтаас сэргийлэх баталгаажуулалтын төлөв: сүүлд уншсан код болон хэдэн удаа дараалан
// ижил гарсныг хадгална. N удаа дараалан яг ижил код гарсны дараа л зөвшөөрнө.
let scanConfirm = { lastCode:null, count:0 };
const SCAN_CONFIRM_NEEDED = 2; // хэдэн удаа дараалан ижил унших шаардлагатай
function openCameraModal(target){
  cameraScanTarget = target;
  scanConfirm = { lastCode:null, count:0 };
  cameraTorchOn = false; cameraTorchSupported = false; cameraZoomCaps = null; cameraZoomLevel = 2;
  state.modal = { type:'camera', data:{} };
  render();
}
function startCameraScanner(){
  if(typeof Html5Qrcode === 'undefined'){ flash('Камерын сан ачаалагдсангүй. Интернэт холболтоо шалгаад дахин оролдоно уу', 'warm'); return; }
  try{
    html5QrcodeInstance = new Html5Qrcode('cameraReader', {
      // Андройд Chrome дээрх төхөөрөмжийн УУГУУЛ (native) баркод таних хөдөлгүүрийг ашиглана -
      // JS-ээр таньдгаас хамаагүй хурдан бөгөөд алдаа багатай
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
      verbose: false
    });
    cameraRunning = false;
    scanConfirm = { lastCode:null, count:0 };
    html5QrcodeInstance.start(
      { facingMode: 'environment' },
      {
        fps: 15,
        qrbox: function(viewfinderWidth, viewfinderHeight){
          // Уншuulах хүрээг дэлгэцийн хэмжээнд тааруулж томоор гаргана - жижиг хүрээ удаан уншдаг
          const w = Math.floor(viewfinderWidth * 0.9);
          const h = Math.floor(Math.min(viewfinderHeight * 0.45, w * 0.6));
          return { width: w, height: h };
        },
        // Өндөр нягтралтай дүрс авах тусам жижиг/бүдэг/холын баркодыг хурдан танина
        videoConstraints: {
          facingMode: 'environment',
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        // Зөвхөн дэлгүүрт бодитоор хэрэглэгддэг форматуудыг таньж, бусад формат хооронд
        // андуурч буруу уншихаас сэргийлнэ.
        formatsToSupport: (typeof Html5QrcodeSupportedFormats !== 'undefined') ? [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.QR_CODE
        ] : undefined
      },
      (decodedText)=>{
        const code = (decodedText||'').trim();
        if(!code) return;
        // 1) Стандарт тоон баркодын check-digit шалгалт - алдаатай кодыг шууд хаяна
        if(!isValidNumericBarcodeChecksum(code)){
          scanConfirm = { lastCode:null, count:0 };
          return; // энэ frame-ийг чимээгүй үл тоомсорлоод дахин уншиж үргэлжлүүлнэ
        }
        // 2) Дараалан ижил код N удаа гарсны дараа л баталгаажуулна - нэг frame дээрх
        //    гэнэтийн буруу уншилтаас хамгаална
        if(scanConfirm.lastCode === code){
          scanConfirm.count += 1;
        } else {
          scanConfirm = { lastCode: code, count: 1 };
        }
        if(scanConfirm.count < SCAN_CONFIRM_NEEDED) return;
        scanConfirm = { lastCode:null, count:0 };
        stopCameraScanner();
        state.modal = null;
        if(cameraScanTarget==='purchase'){ handlePurchaseScanSubmit(code); } else { handleScanSubmit(code); }
        render();
      },
      function(){ /* frame бүр амжилтгүй унших - хэвийн, дахин оролдоно */ }
    ).then(function(){
      cameraRunning = true; // энд ирснээр камер бодитоор эхэлсэн гэдгийг баталгаажуулна
      // Хол зайнаас уншихад туслах: төхөөрөмж дэмждэг бол 2x ойртуулалт (zoom) болон
      // тасралтгүй фокус (continuous focus)-ыг автоматаар идэвхжүүлнэ.
      try{
        const caps = html5QrcodeInstance.getRunningTrackCapabilities ? html5QrcodeInstance.getRunningTrackCapabilities() : null;
        const adv = [];
        if(caps && caps.zoom && caps.zoom.max){
          cameraZoomCaps = caps.zoom;
          adv.push({ zoom: Math.min(caps.zoom.max, Math.max(caps.zoom.min||1, 2)) });
        } else { cameraZoomCaps = null; }
        if(caps && caps.focusMode && Array.isArray(caps.focusMode) && caps.focusMode.indexOf('continuous')>-1){
          adv.push({ focusMode: 'continuous' });
        }
        cameraTorchSupported = !!(caps && ('torch' in caps));
        if(adv.length && html5QrcodeInstance.applyVideoConstraints){
          html5QrcodeInstance.applyVideoConstraints({ advanced: adv }).catch(function(){});
        }
        // Гэрэл/zoom товчнуудын харагдацыг шинэчлэхийн тулд камерын удирдлагын хэсгийг дахин зурна
        const ctrl = document.getElementById('cameraControls');
        if(ctrl){ ctrl.innerHTML = cameraControlsHtml(); attachCameraControlHandlers(); }
      }catch(e){ /* тухайн төхөөрөмж дэмжихгүй бол хэвийн үргэлжилнэ */ }
    }).catch(function(err){
      cameraRunning = false;
      const msg = (err && err.message) ? err.message : String(err);
      if(msg.indexOf('NotAllowedError')>-1 || msg.indexOf('Permission')>-1){
        flash('Камерт хандах зөвшөөрөл олгогдоогүй. Браузерын тохиргооноос зөвшөөрнө уу', 'warm');
      } else if(msg.indexOf('NotFoundError')>-1){
        flash('Камер олдсонгүй', 'warm');
      } else {
        flash('Камер эхлүүлэхэд алдаа: ' + msg, 'warm');
      }
      state.modal = null; render();
    });
  }catch(e){
    cameraRunning = false;
    flash('Камер эхлүүлэхэд алдаа гарлаа', 'warm');
    state.modal = null; render();
  }
}
function stopCameraScanner(){
  scanConfirm = { lastCode:null, count:0 };
  if(html5QrcodeInstance && cameraRunning){
    cameraRunning = false;
    html5QrcodeInstance.stop().then(function(){
      if(html5QrcodeInstance){ html5QrcodeInstance.clear(); }
      html5QrcodeInstance = null;
    }).catch(function(){ html5QrcodeInstance = null; });
  } else {
    // scanner эхлээгүй байсан эсвэл аль хэдийн зогссон - шууд цэвэрлэнэ, stop() дуудахгүй
    html5QrcodeInstance = null;
    cameraRunning = false;
  }
}

function openReturnModal(){
  state.modal = { type:'return', data:{ productId:'', qty:1, note:'' } };
  render();
}
async function saveReturn(form){
  const productId = form.productId.value; const qty = parseFloat(form.qty.value)||0; const note = form.note.value.trim();
  const returnType = form.returnType.value; // 'normal' | 'defective'
  const p = state.products.find(x=>x.id===productId);
  if(!p){ flash('Бараа сонгоно уу', 'warm'); return; }
  if(qty<=0){ flash('Тоо буруу байна', 'warm'); return; }
  if(returnType==='normal'){
    p.stock = (p.stock||0) + qty; // хэвийн буцаалт: дахин зарах боломжтой тул агуулахад буцаж орно
  }
  // гэмтэлтэй буцаалт: агуулахад орохгүй, зарах боломжгүй тул зогсоно (алдагдал болно)
  const rec = { id: uid(), timestamp: Date.now(), productId, name:p.name, qty, price:getSellPrice(p), total: getSellPrice(p)*qty, returnType, note };
  state.returns.push(rec);
  await saveKey('pos:products', state.products);
  await saveKey('pos:returns', state.returns);
  state.modal = null; flash('Буцаалт бүртгэгдлээ', 'accent'); render();
}

// Тухайн барааны үлдэгдлийг бүх гүйлгээний түүхээс (Орлого - Борлуулалт - Хоргодол + Хэвийн буцаалт)
// дахин тооцоолно. Аль нэг засвар/алдаанаас болж үлдэгдэл зөрсөн үед үнэн тоог сэргээхэд ашиглана.
function computeStockFromLedgers(productId){
  let s = 0;
  state.purchases.forEach(pu=>{ (pu.items||[]).forEach(it=>{ if(it.productId===productId) s += it.qty; }); });
  state.sales.forEach(sa=>{ (sa.items||[]).forEach(it=>{ if(it.productId===productId) s -= it.qty; }); });
  state.spoilage.forEach(r=>{ if(r.productId===productId) s -= r.qty; });
  state.returns.forEach(r=>{ if(r.productId===productId && r.returnType==='normal') s += r.qty; });
  return s;
}
// ХУРДНЫ ЗАСВАР: computeStockFromLedgers-ийг бараа тус бүрд нь дуудвал O(бараа x гүйлгээ)
// болдог тул маш их дата хуримтлагдсан үед (олон сарын түүх) апп ГАЦДАГ байсан.
// Энэ функц ЗӨВХӨН НЭГ УДАА бүх гүйлгээгээр гүйж, бараа бүрийн зөрүүг Map-д хадгална - O(гүйлгээ).
function computeAllStockDeltas(){
  const m = new Map();
  const add = (id, n) => { if(!id) return; m.set(id, (m.get(id)||0) + n); };
  state.purchases.forEach(pu=>{ (pu.items||[]).forEach(it=>{ add(it.productId, it.qty); }); });
  state.sales.forEach(sa=>{ (sa.items||[]).forEach(it=>{ add(it.productId, -it.qty); }); });
  state.spoilage.forEach(r=>{ add(r.productId, -r.qty); });
  state.returns.forEach(r=>{ if(r.returnType==='normal') add(r.productId, r.qty); });
  return m;
}
async function reconcileAllStocks(){
  // Эхлээд зөрүүтэй бараануудыг олж, хэрэглэгчид харуулж баталгаажуулна
  // (ХУРДНЫ ЗАСВАР: нэг л удаа бүх түүхийг уншиж Map үүсгэнэ, дараа нь бараа бүрийг Map-аас шууд харна)
  const deltas = computeAllStockDeltas();
  const diffs = [];
  state.products.forEach(p=>{
    const computed = Math.max(0, deltas.get(p.id)||0);
    if(computed !== (p.stock||0)){ diffs.push({p, from:(p.stock||0), to:computed}); }
  });
  if(diffs.length===0){ flash('Бүх барааны үлдэгдэл гүйлгээний түүхтэй таарч байна \u2714', 'accent'); return; }
  const preview = diffs.slice(0,12).map(d=>'\u2022 '+d.p.name+': '+d.from+' \u2192 '+d.to).join('\n') + (diffs.length>12 ? '\n... нийт '+diffs.length+' бараа' : '');
  const ok = confirm(
    'Дараах '+diffs.length+' барааны үлдэгдэл гүйлгээний түүхээс зөрж байна:\n\n'+preview+
    '\n\nАНХААР: Энэ тооцоо зөвхөн программд бүртгэгдсэн Орлого/Борлуулалт/Буцаалт/Хоргодлын түүх дээр үндэслэнэ. '+
    'Хэрэв программ ашиглахаас ӨМНӨХ үлдэгдэл Орлогоор бүртгэгдээгүй бараа байвал тэр нь 0 болж магадгүй.\n\nЗасах уу?'
  );
  if(!ok) return;
  diffs.forEach(d=>{ d.p.stock = d.to; });
  await saveKey('pos:products', state.products);
  flash(diffs.length+' барааны үлдэгдэл гүйлгээний түүхээс зөв тоогоор сэргээгдлээ', 'accent');
  render();
}

async function saveSpoilage(form){
  const productId = form.productId.value; const qty = parseFloat(form.qty.value)||0;
  const reason = form.reason.value.trim(); const note = form.note.value.trim();
  const p = state.products.find(x=>x.id===productId);
  if(!p){ flash('Бараа сонгоно уу', 'warm'); return; }
  if(qty<=0 || qty>p.stock){ flash('Тоо буруу эсвэл үлдэгдлээс их байна', 'warm'); return; }
  p.stock = Math.max(0,(p.stock||0) - qty);
  const rec = { id: uid(), timestamp: Date.now(), productId, name:p.name, qty, price:p.buyPrice, total:p.buyPrice*qty, reason, note };
  state.spoilage.push(rec);
  await saveKey('pos:products', state.products);
  await saveKey('pos:spoilage', state.spoilage);
  state.modal = null; flash('Хоргодол бүртгэгдлээ', 'accent'); render();
}

function openExpenseModal(expense){
  state.modal = { type:'expense', data: expense ? {...expense} : {
    id:null, category: EXPENSE_CATEGORIES[0], amount:0, note:'',
    dateStr: new Date().toISOString().slice(0,10)
  }};
  render();
}
async function saveExpense(form){
  const d = state.modal.data;
  const category = form.category.value;
  const amount = parseFloat(form.amount.value)||0;
  const note = form.note.value.trim();
  const dateStr = form.dateStr.value;
  if(amount<=0){ flash('Дүнг зөв оруулна уу', 'warm'); return; }
  if(!dateStr){ flash('Огноог оруулна уу', 'warm'); return; }
  const timestamp = new Date(dateStr + 'T12:00:00').getTime();
  if(d.id){
    const idx = state.expenses.findIndex(x=>x.id===d.id);
    if(idx>-1){ state.expenses[idx] = {...state.expenses[idx], category, amount, note, timestamp}; }
  } else {
    state.expenses.push({ id: uid(), timestamp, category, amount, note });
  }
  await saveKey('pos:expenses', state.expenses);
  state.modal = null; flash('Зарлага бүртгэгдлээ', 'accent'); render();
}

// өрхийн хэрэглээ бол холбогдсон Зарлагын мөр мөн устгагдана.
async function deleteSale(id){
  const s = state.sales.find(x=>x.id===id);
  if(!s) return;
  const desc = (s.items||[]).map(it=>it.name+' x'+it.qty).join(', ');
  if(!confirm('Энэ борлуулалтыг устгах уу?\n\n'+fmtDate(s.timestamp)+'\n'+desc+'\nДүн: '+mnt(s.total)+'\n\nҮлдэгдэл буцаж нэмэгдэнэ'+(s.payType==='credit'?', харилцагчийн өр хасагдана':'')+'.')) return;
  (s.items||[]).forEach(it=>{
    const p = state.products.find(x=>x.id===it.productId);
    if(p) p.stock = (p.stock||0) + it.qty;
  });
  if(s.payType==='credit' && s.customerId){
    const c = state.customers.find(x=>x.id===s.customerId);
    if(c){ c.debt = Math.max(0, (c.debt||0) - s.total); }
    await saveKey('pos:customers', state.customers);
  }
  if(s.payType==='household'){
    const before = state.expenses.length;
    state.expenses = state.expenses.filter(x=>x.sourceSaleId!==s.id);
    if(state.expenses.length !== before){ await saveKey('pos:expenses', state.expenses); }
  }
  state.sales = state.sales.filter(x=>x.id!==id);
  await saveKey('pos:products', state.products);
  await saveKey('pos:sales', state.sales);
  flash('Борлуулалт устгагдаж, үлдэгдэл сэргэлээ', 'accent');
  render();
}

function rangeStart(range){
  const now = new Date();
  if(range==='today'){ return new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(); }
  if(range==='week'){ const d=new Date(now); d.setDate(d.getDate()-7); return d.getTime(); }
  if(range==='month'){ return new Date(now.getFullYear(),now.getMonth(),1).getTime(); }
  if(range==='3month'){ const d=new Date(now); d.setMonth(d.getMonth()-3); return d.getTime(); }
  if(range==='6month'){ const d=new Date(now); d.setMonth(d.getMonth()-6); return d.getTime(); }
  if(range==='year'){ const d=new Date(now); d.setFullYear(d.getFullYear()-1); return d.getTime(); }
  return 0;
}
// Тодорхой хугацааны ашгийг тооцоолно - Тайлан табын үндсэн шүүлтүүрээс үл хамааран,
// хэд хэдэн хугацааны ашгийг зэрэг харьцуулж харуулахад ашиглана.
function profitForRange(range){

function topProducts(sales){

function totalProfit(sales){
  return sales.reduce((sum,s)=> sum + s.items.reduce((is,it)=> is + ((it.price - (it.buyPrice||0)) * it.qty), 0), 0);
}
function saleProfit(s){
  return s.items.reduce((is,it)=> is + ((it.price - (it.buyPrice||0)) * it.qty), 0);
}
// ЗЭЭЛИЙН АШГИЙГ ТӨЛӨГДСӨН ӨДӨРТ НЬ ТООЦОХ ЛОГИК:
// Зээлээр гаргасан борлуулалтын ашиг зарсан өдөртөө биш, харин харилцагч төлбөрөө
// төлсөн өдөрт тооцогдоно. Харилцагчийн төлбөрүүдийг хамгийн эртний зээлээс нь эхлэн
// (FIFO дарааллаар) хуваарилж, хэсэгчлэн төлсөн бол тухайн төлсөн хувиар нь ашгийг
// тухайн төлбөрийн өдөрт хуваарилна.
// Жишээ: 10,000₮-ийн зээл (2,000₮ ашигтай)-ийг 2 удаа 5,000₮-өөр төлбөл,
// төлбөр тус бүрийн өдөрт 1,000₮ ашиг тооцогдоно.
function creditProfitEvents(){
  const events = [];
  state.customers.forEach(c=>{
    const sales = getCustomerCreditSales(c.id); // огноогоор өсөхөөр эрэмбэлэгдсэн
    if(!sales.length) return;
    const pays = (c.paymentHistory||[]).slice().sort((a,b)=>a.timestamp-b.timestamp);
    let si = 0;
    let saleRemaining = sales[0].total;
    pays.forEach(p=>{
      let amt = p.amount;
      while(amt>0 && si<sales.length){
        const s = sales[si];
        const applied = Math.min(amt, saleRemaining);
        if(applied>0 && s.total>0){
          events.push({ timestamp: p.timestamp, profit: (applied/s.total)*saleProfit(s) });
        }
        saleRemaining -= applied; amt -= applied;
        if(saleRemaining<=0){ si++; saleRemaining = si<sales.length ? sales[si].total : 0; }
      }
    });
  });
  return events;
}
// Тухайн хугацааны БОДИТ (мөнгө орж ирсэн) ашиг:
//  - Бэлэн/Qpay/POS борлуулалтын ашиг -> зарсан өдрөөрөө
//  - Зээлийн борлуулалтын ашиг -> төлбөр төлөгдсөн өдрөөрөө (хэсэгчлэн бол хувь тэнцүүлж)
//  - Өрхийн хэрэглээ -> ашигт огт тооцохгүй
function cashBasisProfit(startTs){
  const cashSales = state.sales.filter(s=>s.timestamp>=startTs && s.payType!=='household' && s.payType!=='credit');
  let p = totalProfit(cashSales);
  creditProfitEvents().forEach(e=>{ if(e.timestamp>=startTs) p += e.profit; });
  return p;
}

function totalPayable(){ return state.suppliers.reduce((s,x)=>s+(x.debt||0),0); }

function purchaseHistoryRows(){
  // орлогын sheet-ний яг форматад тохируулж, худалдан авалтуудыг мөр мөр болгож задална (нэг мөр = нэг барааны мөр)
  const f = state.purchaseFilters;
  const hasFilters = f.startDate || f.endDate || f.supplierId || f.productQuery || f.category || f.payType;
  let startMs, endMs;
  if(hasFilters && (f.startDate || f.endDate)){
    startMs = f.startDate ? new Date(f.startDate+'T00:00:00').getTime() : 0;
    endMs = f.endDate ? new Date(f.endDate+'T23:59:59').getTime() : Infinity;
  } else if(!hasFilters){
    const now = new Date();
    startMs = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    endMs = Infinity;
  } else {
    startMs = 0; endMs = Infinity;
  }
  const rows = [];
  state.purchases.slice().reverse().forEach(pu=>{
    if(pu.timestamp < startMs || pu.timestamp > endMs) return;
    if(f.supplierId && pu.supplierId !== f.supplierId) return;
    if(f.payType && (pu.payType||'credit') !== f.payType) return;
    const sup = state.suppliers.find(s=>s.id===pu.supplierId);
    pu.items.forEach(it=>{
      const p = state.products.find(x=>x.id===it.productId);
      if(f.productQuery && !it.name.toLowerCase().includes(f.productQuery.toLowerCase())) return;
      if(f.category && (!p || p.category!==f.category)) return;
      rows.push({ purchaseId: pu.id, timestamp: pu.timestamp, barcode: p?p.barcode:'', name: it.name, qty: it.qty, price: it.price, payType: pu.payType||'credit', supplierName: sup?sup.name:'-' });
    });
  });
  return rows;
}

// Баркодоор бүтээгдэхүүний нэр/ангиллыг үнэгүй, нээлттэй Open Food Facts сангаас хайна.
// Гол төлөв олон улсын (импортын) барааны хувьд ажиллана - цэвэр дотоодын бараанд
// бүртгэл байхгүй байж болно, тэр үед хэрэглэгч гараар бичнэ.
async function lookupBarcodeInfo(barcode){
  try{
    const res = await fetchWithTimeout(
      'https://world.openfoodfacts.org/api/v2/product/' + encodeURIComponent(barcode) + '.json?fields=product_name,product_name_en,categories,quantity,brands',
      { method:'GET' }, 6000
    );
    if(!res.ok) return { ok:false, reason:'http_'+res.status };
    let data;
    try{ data = await res.json(); }catch(e){ return { ok:false, reason:'bad_json' }; }
    if(!data || data.status!==1 || !data.product) return { ok:false, reason:'not_in_db' };
    const p = data.product;
    let name = (p.product_name || p.product_name_en || '').trim();
    if(!name) return { ok:false, reason:'no_name' };
    if(p.brands){ const brand = p.brands.split(',')[0].trim(); if(brand && name.toLowerCase().indexOf(brand.toLowerCase())===-1){ name = brand + ' ' + name; } }
    if(p.quantity && name.indexOf(p.quantity)===-1){ name = name + ' ' + p.quantity; }
    let category = '';
    if(p.categories){
      const cats = p.categories.split(',').map(c=>c.trim().replace(/^[a-z]{2}:/i,''));
      category = cats.length ? cats[cats.length-1] : '';
    }
    return { ok:true, name, category };
  }catch(e){
    // fetch() өөрөө шидсэн алдаа - ихэвчлэн CORS хориглосон эсвэл сүлжээ огт хүрэхгүй байгаа
    // үед л ийм байдлаар шидэгддэг (HTTP-ийн алдааны код биш). Энэ мэдээллийг тусад нь ялгаж
    // харуулснаар "тухайн бараа санд байхгүй" гэдгээс "холбогдож огт чадсангүй" гэдгийг ялгана.
    const isAbort = e && e.name==='AbortError';
    return { ok:false, reason: isAbort ? 'timeout' : 'network_or_cors', errMsg: e && e.message };
  }
}
// Шинэ бараа бүртгэх цонхыг баркодтойгоор нээхэд дуудагдана - цонх нээгдмэгц
// дэвсгэрт хайлт эхлүүлж, олдвол нэр/ангиллыг автоматаар бөглөнө.
async function triggerBarcodeLookup(barcode){
  if(!barcode) return;
  const d = state.modal && state.modal.data;
  if(!d || state.modal.type!=='quickNewProduct') return;
  d.lookupStatus = 'loading';
  render();
  const info = await lookupBarcodeInfo(barcode);
  // Хайлт дуусах хооронд хэрэглэгч цонхоо хааж/өөрчилсөн эсэхийг шалгана
  if(!state.modal || state.modal.type!=='quickNewProduct' || state.modal.data.barcode!==barcode) return;
  const d2 = state.modal.data;
  if(info.ok){
    if(!d2.name){ d2.name = info.name; }
    if(!d2.category && info.category){ d2.category = info.category; }
    d2.lookupStatus = 'found';
  } else {
    d2.lookupStatus = 'notfound';
    d2.lookupReason = info.reason; // жишээ нь 'network_or_cors', 'not_in_db', 'timeout'
    console.log('[Баркод хайлт амжилтгүй]', barcode, info.reason, info.errMsg||'');
  }
  render();
}

// Excel/Sheets-ээс paste хийсэн текстийг мөр мөрөөр задлана. Багана тусгаарлагч
// нь TAB (шууд Excel-ээс paste хийхэд ийм байдаг), байхгүй бол таслалаар оролдоно.
function parseBulkPurchaseText(text){
  let lines = (text||'').split('\n').map(l=>l.replace(/\r$/,'')).filter(l=>l.trim()!=='');
  // Толгой мөр илрүүлж алгасах: эхний мөрийн 2-р багана тоо биш бол (жишээ нь "Тоо" гэсэн текст) толгой мөр гэж үзнэ
  if(lines.length){
    let firstCols = lines[0].split('\t');
    if(firstCols.length < 2) firstCols = lines[0].split(',');
    const secondVal = (firstCols[1]||'').replace(/["']/g,'').trim();
    if(secondVal && isNaN(parseFloat(secondVal.replace(/[^0-9.\-]/g,'')))){ lines = lines.slice(1); }
  }
  const rows = []; const errors = [];
  lines.forEach((line, idx)=>{
    let cols = line.split('\t');
    if(cols.length < 2) cols = line.split(',');
    cols = cols.map(c=>c.trim().replace(/^"(.*)"$/,'$1')); // CSV-ийн ишлэл ("") арилгана
    const name = (cols[0]||'').trim();
    if(!name){ errors.push('мөр '+(idx+1)+': нэргүй'); return; }
    const qty = parseFloat((cols[1]||'').replace(/[^0-9.\-]/g,'')) || 1;
    const buyPrice = parseFloat((cols[2]||'').replace(/[^0-9.\-]/g,'')) || 0;
    const barcode = (cols[3]||'').trim();
    const category = (cols[4]||'').trim();
    const sellPriceRaw = (cols[5]||'').trim();
    const sellPrice = sellPriceRaw ? (parseFloat(sellPriceRaw.replace(/[^0-9.\-]/g,''))||null) : null;
    const existing = barcode ? state.products.find(p=>p.barcode===barcode)
      : state.products.find(p=>p.name.trim().toLowerCase()===name.toLowerCase());
    rows.push({ name, qty, buyPrice, barcode, category, sellPrice, matched: !!existing, productId: existing?existing.id:null });
  });
  return { rows, errors };
}
// Урьдчилан харсан мөрүүдийг одоо байгаа Худалдан авалтын сагстай яг адилхан
// логикоор (existing бол productId-аар, шинэ бол pendingNewProduct-оор) нэгтгэнэ.
function bulkAddRowsToPurchaseCart(rows){
  rows.forEach(r=>{
    if(r.productId){
      const existingCartItem = state.purchaseCart.find(c=>c.productId===r.productId);
      if(existingCartItem){ existingCartItem.qty += r.qty; existingCartItem.price = r.buyPrice; }
      else { state.purchaseCart.push({ cartItemId: uid(), productId: r.productId, name:r.name, price:r.buyPrice, qty:r.qty }); }
    } else {
      const tempKey = 'NEW::' + (r.barcode || r.name);
      const existingPending = state.purchaseCart.find(c=>c.pendingNewProduct && c.pendingNewProduct._tempKey===tempKey);
      if(existingPending){
        existingPending.qty += r.qty;
        existingPending.price = r.buyPrice;
      } else {
        state.purchaseCart.push({
          cartItemId: uid(), productId: null, name:r.name, price:r.buyPrice, qty:r.qty,
          pendingNewProduct: { barcode: r.barcode||'', category: r.category||'', buyPrice: r.buyPrice, manualSellPrice: r.sellPrice, supplierId: state.purchaseSupplierId||'', _tempKey: tempKey }
        });
      }
    }
  });
}
async function saveQuickNewProduct(form){
  const d = state.modal.data;
  const name = form.name.value.trim();
  if(!name){ flash('Барааны нэрийг оруулна уу', 'warm'); return; }
  let category = '';
  if(form.categorySelect && form.categorySelect.value){ category = form.categorySelect.value; }
  else if(form.categoryNew && form.categoryNew.value.trim()){ category = form.categoryNew.value.trim(); }
  const qty = parseFloat(form.qty.value)||1;
  const buyPrice = parseFloat(form.buyPrice.value)||0;
  const manualSellPrice = (form.manualSellPrice.value.trim()!=='') ? (parseFloat(form.manualSellPrice.value)||0) : null;

  if(d.productId){
    // Олдсон (аль хэдийн бүртгэлтэй) бараа - засварыг ЭНД шууд хадгалахгүй, зөвхөн сагсанд "хүлээгдэж буй засвар" болгож хадгална.
    // Бодит хадгалалт зөвхөн эцсийн "Бүртгэх" товч дарахад л хийгдэнэ.
    const pendingEdit = { name, category, buyPrice, manualSellPrice };
    const existingCartItem = state.purchaseCart.find(c=>c.productId===d.productId);
    if(existingCartItem){ existingCartItem.qty += qty; existingCartItem.price = buyPrice; existingCartItem.pendingEdit = pendingEdit; }
    else { state.purchaseCart.push({ cartItemId: uid(), productId: d.productId, name, price: buyPrice, qty, pendingEdit }); }
  } else {
    // Шинэ бараа - state.products руу ОГТ бичихгүй. Зөвхөн сагсанд "хүлээгдэж буй шинэ бараа" болгож хадгална.
    // Ижил баркодоор дахин скан хийвэл, тоог нь нэгтгэнэ (давхар мөр үүсэхгүй).
    const tempKey = 'NEW::' + (d.barcode || name);
    const existingPending = state.purchaseCart.find(c=>c.pendingNewProduct && c.pendingNewProduct._tempKey===tempKey);
    if(existingPending){
      existingPending.qty += qty;
      existingPending.price = buyPrice;
      existingPending.pendingNewProduct.category = category;
      existingPending.pendingNewProduct.manualSellPrice = manualSellPrice;
    } else {
      state.purchaseCart.push({
        cartItemId: uid(), productId: null, name, price: buyPrice, qty,
        pendingNewProduct: { barcode: d.barcode||'', category, buyPrice, manualSellPrice, supplierId: d.supplierId||'', _tempKey: tempKey }
      });
    }
  }
  state.modal = { type:'purchaseEntry' }; // Нийлүүлэгчээс бараа авах цонх руу буцаж, цааш скан хийж болно
  flash('Сагсанд нэмэгдлээ (зөвхөн "Бүртгэх" дарахад л албан ёсоор хадгалагдана)', 'accent');
  render();
}

async function saveQuickCustomer(form){
  const name = form.name.value.trim();
  const phone = form.phone.value.trim();
  if(!name){ flash('Нэрийг оруулна уу', 'warm'); return; }
  const c = { id: uid(), name, phone, debt:0, paidTotal:0 };
  state.customers.push(c);
  await saveKey('pos:customers', state.customers);
  state.cartCustomerId = c.id; // шинээр нэмсэн харилцагчийг сагсанд шууд сонгоно
  state.modal = null;
  flash('"'+name+'" нэмэгдэж, сагсанд сонгогдлоо', 'accent');
  render();
}

function attachHandlers(){
  document.querySelectorAll('[data-tab]').forEach(el=>{ el.onclick = ()=> setTab(el.dataset.tab); });
  const applyUpdateBtn = document.getElementById('applyUpdateBtn');
  if(applyUpdateBtn) applyUpdateBtn.onclick = ()=>{ window.location.reload(); };
  const dismissUpdateBtn = document.getElementById('dismissUpdateBtn');
  if(dismissUpdateBtn) dismissUpdateBtn.onclick = ()=>{ state.updateAvailable = false; render(); };
  const switchRoleBtn = document.getElementById('switchRoleBtn');
  if(switchRoleBtn) switchRoleBtn.onclick = ()=>{ state.role = null; state.modal = null; render(); };
  const ebarimtSettingsBtn = document.getElementById('ebarimtSettingsBtn');
  if(ebarimtSettingsBtn) ebarimtSettingsBtn.onclick = ()=>{ state.modal = {type:'ebarimtSettings', data:{}}; render(); };
  const ebarimtSettingsForm = document.getElementById('ebarimtSettingsForm');
  if(ebarimtSettingsForm) ebarimtSettingsForm.onsubmit = (e)=>{ e.preventDefault(); saveEbarimtSettings(ebarimtSettingsForm); };
  const testEbarimtBtn = document.getElementById('testEbarimtBtn');
  if(testEbarimtBtn) testEbarimtBtn.onclick = ()=>{
    // Шалгахын өмнө форм дээрх хаягийг түр авч ашиглана (хадгалаагүй байсан ч шалгаж болно)
    const f = document.getElementById('ebarimtSettingsForm');
    if(f && f.apiUrl.value.trim()) state.ebarimtSettings.apiUrl = f.apiUrl.value.trim();
    testEbarimtConnection();
  };
  const retryEbarimtBtn = document.getElementById('retryEbarimtBtn');
  if(retryEbarimtBtn) retryEbarimtBtn.onclick = ()=> retryEbarimtQueue(true);
  const exportBackupBtn = document.getElementById('exportBackupBtn');
  if(exportBackupBtn) exportBackupBtn.onclick = exportBackup;
  const importBackupBtn = document.getElementById('importBackupBtn');
  const importBackupFile = document.getElementById('importBackupFile');
  if(importBackupBtn && importBackupFile){
    importBackupBtn.onclick = ()=> importBackupFile.click();
    importBackupFile.onchange = ()=>{ if(importBackupFile.files[0]){ importBackupFromFile(importBackupFile.files[0]); } importBackupFile.value=''; };
  }
  const scanInput = document.getElementById('scanInput');
  if(scanInput){
    // Компьютер дээр физик баркод уншигч клавиатур мэт ажилладаг тул автоматаар focus өгнө.
    // Гар утсан дээр камер товч ашигладаг тул автомат focus хийхгүй - эс тэгвэл дэлгэцний гар
    // өөрөө гарч ирээд байдаг тул хэрэглэгч гараар товшсон үед л focus орно.
    if(!isMobileDevice()){ setTimeout(()=>{ scanInput.focus(); }, 50); }
    attachLayoutSafeBarcodeInput(scanInput, handleScanSubmit);
  }
  const scanGoBtn = document.getElementById('scanGoBtn');
  if(scanGoBtn) scanGoBtn.onclick = ()=> handleScanSubmit(document.getElementById('scanInput').value);
  const cameraScanBtn = document.getElementById('cameraScanBtn');
  if(cameraScanBtn) cameraScanBtn.onclick = ()=> openCameraModal('kass');
  document.querySelectorAll('[data-selectcat]').forEach(el=>{ el.onclick = ()=>{ state.kassCategoryFilter = el.dataset.selectcat; render(); }; });
  const backToCategoriesLink = document.getElementById('backToCategoriesLink');
  if(backToCategoriesLink) backToCategoriesLink.onclick = ()=>{ state.kassCategoryFilter = null; render(); };
  document.querySelectorAll('[data-addcart]').forEach(el=>{ el.onclick = ()=> addToCart(el.dataset.addcart); });
  document.querySelectorAll('[data-qtyplus]').forEach(el=> el.onclick = ()=> changeCartQty(el.dataset.qtyplus, 1));
  document.querySelectorAll('[data-qtyminus]').forEach(el=> el.onclick = ()=> changeCartQty(el.dataset.qtyminus, -1));
  document.querySelectorAll('[data-rmcart]').forEach(el=> el.onclick = ()=> removeFromCart(el.dataset.rmcart));
  document.querySelectorAll('[data-paytype]').forEach(el=> el.onclick = ()=>{ state.cartPayType = el.dataset.paytype; render(); });
  const cartCustomerSel = document.getElementById('cartCustomerSel');
  if(cartCustomerSel) cartCustomerSel.onchange = ()=>{ state.cartCustomerId = cartCustomerSel.value; };
  const quickAddCustomerBtn = document.getElementById('quickAddCustomerBtn');
  if(quickAddCustomerBtn) quickAddCustomerBtn.onclick = ()=>{ state.modal = {type:'quickCustomer', data:{}}; render(); };
  const qpayQrInput = document.getElementById('qpayQrInput');
  if(qpayQrInput) qpayQrInput.onchange = ()=>{
    const file = qpayQrInput.files && qpayQrInput.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{
      state.qpayQr = reader.result;
      await saveKey('pos:qpayQr', state.qpayQr);
      flash('QR зураг шинэчлэгдлээ', 'accent');
      render();
    };
    reader.readAsDataURL(file);
  };
  const quickCustomerForm = document.getElementById('quickCustomerForm');
  if(quickCustomerForm) quickCustomerForm.onsubmit = (e)=>{ e.preventDefault(); saveQuickCustomer(quickCustomerForm); };
  const ebarimtInput = document.getElementById('ebarimtInput');
  if(ebarimtInput) ebarimtInput.oninput = ()=>{ state.cartEbarimt = ebarimtInput.value; };
  const checkoutBtn = document.getElementById('checkoutBtn');
  if(checkoutBtn) checkoutBtn.onclick = checkout;
  const copyTotalBtn = document.getElementById('copyTotalBtn');
  if(copyTotalBtn) copyTotalBtn.onclick = async ()=>{
    const total = cartTotal();
    const ok = await copyToClipboard(String(Math.round(total)));
    if(ok){ flash('Дүн хуулагдлаа: ' + mnt(total) + ' - Ебаримт хуудсанд paste хийнэ үү', 'accent'); }
    else{ flash('Хуулж чадсангүй - гараар бичнэ үү: ' + mnt(total), 'warm'); }
  };

  const baraaSearch = document.getElementById('baraaSearch');
  let baraaSearchDebounce;
  if(baraaSearch){ baraaSearch.oninput = ()=>{
      // ХУРДНЫ ЗАСВАР: үсэг бичих бүрд бүтэн Бараа хүснэгтийг дахин зурдаг байснаас
      // олон бараатай үед бичихэд "гацдаг" мэт мэдрэгддэг байсан тул бага зэрэг хүлээгээд (debounce)
      // зурдаг болгосон - бичих явц гөлгөр, харин хайлт нэг мөр ч хожимдохгүй.
      clearTimeout(baraaSearchDebounce);
      const val = baraaSearch.value;
      baraaSearchDebounce = setTimeout(()=>{
        state.search = val; render();

      const text = String(reader.result||'').replace(/^\uFEFF/, '');
      const preview = parseBulkPurchaseText(text);
      if(preview.rows.length===0){ flash('Файлаас өгөгдөл олдсонгүй - CSV формат зөв эсэхийг шалгана уу', 'warm'); return; }

  function submitPurchaseProductName(){
    const raw = purchaseProductNameInput ? purchaseProductNameInput.value.trim() : '';
    if(!raw) return;
    const normalized = raw.toLowerCase().replace(/\s+/g,' ');
    const match = state.products.find(p=> p.name.toLowerCase().replace(/\s+/g,' ') === normalized);
    if(match){
      addToPurchaseCart(match.id);
      if(purchaseProductNameInput) purchaseProductNameInput.value='';
    } else {
      // олдсонгуй - шинэ бараа бүртгэх цонх нэрийг нь урьдчилан бичсэн байдлаар нээнэ
      state.modal = { type:'quickNewProduct', data:{ barcode:'', name:raw, category: state.purchaseCategoryFilter||'', supplierId: state.purchaseSupplierId||'' } };
      render();
    }
  }
  if(purchaseProductNameGoBtn) purchaseProductNameGoBtn.onclick = submitPurchaseProductName;
  if(purchaseProductNameInput) purchaseProductNameInput.onkeydown = (e)=>{ if(e.key==='Enter'){ e.preventDefault(); submitPurchaseProductName(); } };
  document.querySelectorAll('[data-purqty]').forEach(el=>{ el.onchange = ()=>{ const c = state.purchaseCart.find(x=>x.cartItemId===el.dataset.purqty); if(c){ c.qty = Math.max(1, parseFloat(el.value)||1); render(); } }; });

  document.querySelectorAll('[data-editpurcat]').forEach(el=>{ el.onchange = async ()=>{
    const p = state.products.find(x=>x.id===el.dataset.editpurcat);

  const NO_OUTSIDE_CLOSE_TYPES = ['purchaseEntry', 'quickNewProduct'];

    }
    closeModalWithReturn();
  }; }
  const modalCancel = document.getElementById('modalCancel');
  if(modalCancel) modalCancel.onclick = ()=> closeModalWithReturn();
  function closeModalWithReturn(){
    if(state.modal && state.modal.type==='camera'){ stopCameraScanner(); }
    const returnTo = state.modal ? state.modal.returnTo : null;
    state.modal = returnTo==='purchaseEntry' ? { type:'purchaseEntry' } : null;
    render();
  }
  const camReader = document.getElementById('cameraReader');
  if(state.modal && state.modal.type==='camera' && camReader){
    if(!html5QrcodeInstance){
      startCameraScanner();
    } else if(!camReader.hasChildNodes()){
      // render() дахин дуудагдахад камерын <video> элемент устсан ч html5QrcodeInstance
      // хуучин хэвээр үлдсэн - энэ үед дэлгэц хоосон харагддаг байсан гэмтлийг заана.
      // Хуучин instance-ыг зогсоож (камерын урсгалыг суллаж) шинээр эхлүүлнэ.
      const old = html5QrcodeInstance;
      html5QrcodeInstance = null; cameraRunning = false;
      try{ old.stop().catch(function(){}); }catch(e){ /* аль хэдийн зогссон байж болно */ }

        if(state.modal && state.modal.type==='camera' && !html5QrcodeInstance){ startCameraScanner(); }
      }, 150);

  const customerForm = document.getElementById('customerForm');

  const returnForm = document.getElementById('returnForm');

  const spoilageForm = document.getElementById('spoilageForm');

  const expenseForm = document.getElementById('expenseForm');

  const payForm = document.getElementById('payForm');
  if(payForm) payForm.onsubmit = (e)=>{ e.preventDefault();
    const amount = parseFloat(payForm.amount.value)||0; const d = state.modal.data;
    if(d.kind==='supplier'){ paySupplierDebt(d.id, amount); } else { payCustomerDebt(d.id, amount); }
    state.modal = null; flash('Бүртгэгдлээ','accent'); render(); };
}

initData().catch(function(e){ console.error('Эхлэл ачаалахад алдаа:', e); });
// Дэлгэцийг босоо (portrait) чиглэлд түгжинэ - утас хөндлөн болгоход апп эргэхгүй.
// Суулгасан PWA дээр найдвартай ажиллана; энгийн браузер таб дээр зарим үед татгалзаж
// болзошгүй тул catch-аар чимээгүй өнгөрөөнө (manifest.json дээрх portrait тохиргоо үндсэн хамгаалалт).
try{
  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('portrait').catch(function(){ /* браузер зөвшөөрөхгүй байж болно - хэвийн */ });
  }
}catch(e){ /* дэмждэггүй браузер - үл тоомсорлоно */ }

// Service worker бүртгэх - зөвхөн HTTPS эсвэл localhost дээр, мөн service-worker.js файл бодитоор байгаа үед л оролдоно
// (Claude-ийн preview хуудсан дээр энэ файл байхгүй тул урьдчилан шалгаж, Console-д хэрэггүй алдаа гарахаас сэргийлнэ)
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    fetch('./service-worker.js', { method: 'HEAD' }).then(function(res){
      if(res.ok){
        return navigator.serviceWorker.register('./service-worker.js');
      }
    }).catch(function(){
      // service-worker.js олдсонгүй эсвэл сүлжээний алдаа - offline горим идэвхгүй хэвээр байх болно, программ бусад бүх функцээрээ хэвийн ажиллана
    });
  });
  // Шинэ хувилбар идэвхжвэл АВТОМАТААР reload ХИЙХГҮЙ (энэ нь хэрэглэгч дундаа ажиллаж байхад мэдээлэл алдуулдаг байсан) -
  // оронд нь зөвхөн зөөлөн мэдэгдэл (banner) харуулж, хэрэглэгч өөрөө хүссэн үедээ дарж шинэчилдэг болгоно.
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    state.updateAvailable = true;
    render();
  });
}
</script>
